<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Trabalhando com hospedagem de vídeos</h1>
    <h2>Como adicionar vídeos na nossa página?</h2>
    <p>Podemos colocar vídeos na nossa página atraves da tag &lt;video&gt;<br>
    e alguns parametros como &lt;width&gt; e também o parametro &lt;type&gt;</p>
    <video width="600" poster="../Exercício 12/media/fotos/limoes-capa.png" controls>
        <source src="../Exercício 12/media/video/meu-video.mp4" type="video/mp4">
        <source src="../Exercício 12/media/video/meu-video.webm" type="video/webm">
        <source src="../Exercício 12/media/video/meu-video.ogv" type="video/ogv">
        <p>Seu navegador não suporta nem um formato de vídeo</p>
    </video>
    <p>podemos também tentar utilizar um serviço de hospedagem de vídeos</p><hr>
    
<iframe width="560" height="315" src="https://www.youtube.com/embed/nCKwUB8EVbc?si=hJOMbqmDmWd4sn9P" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" autoplay referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    

</body>
</html>
